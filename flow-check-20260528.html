<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Cortrix Website Flow Check</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5ef;
      --panel: #ffffff;
      --text: #1c1f24;
      --muted: #5c6470;
      --line: #d9d3c4;
      --accent: #25636a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(100%, 720px);
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 20px 60px rgba(28, 31, 36, 0.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 1rem;
    }

    dl {
      margin: 24px 0 0;
      display: grid;
      gap: 12px;
    }

    div {
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    dt {
      margin-bottom: 4px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    dd {
      margin: 0;
      color: var(--text);
    }
  </style>
</head>
<body>
  <main>
    <h1>Cortrix Website Flow Check</h1>
    <p>This hidden page verifies the Cortrix website handoff, local validation, GitHub main push, and Vercel production deployment flow.</p>
    <dl>
      <div>
        <dt>Run date</dt>
        <dd>2026-05-28</dd>
      </div>
      <div>
        <dt>Expected result</dt>
        <dd>This page is reachable by direct URL after deployment, but it is not linked from the public homepage.</dd>
      </div>
    </dl>
  </main>
</body>
</html>
